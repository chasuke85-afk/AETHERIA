<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURORA VELOCITY | Ultra Fast</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; filter: blur(1px) contrast(1.2); }
        .ui {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; pointer-events: none;
            text-align: center; letter-spacing: 0.5em; opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="ui">AURORA FLOW</div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [];

        // 圧倒的軽さの秘密：計算を極限まで削ぎ落としたロジック
        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
            for(let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    history: []
                });
            }
        }

        function draw() {
            // 背景を真っ黒にせず、少しだけ残像を残す（ここが美しさのキモ）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, w, h);

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                // 画面端で跳ね返る
                if(p.x < 0 || p.x > w) p.vx *= -1;
                if(p.y < 0 || p.y > h) p.vy *= -1;

                // マウスに向かって少しだけ引き寄せられる（重くない計算）
                if(window.mx) {
                    p.vx += (window.mx - p.x) * 0.0001;
                    p.vy += (window.my - p.y) * 0.0001;
                }

                // 虹色のグラデーションを描画
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${frameCount + i * 5}, 80%, 60%, 0.8)`;
                ctx.lineWidth = 2;
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - p.vx * 10, p.y - p.vy * 10);
                ctx.stroke();
            });

            frameCount++;
            requestAnimationFrame(draw);
        }

        let frameCount = 0;
        window.addEventListener('mousemove', e => { window.mx = e.clientX; window.my = e.clientY; });
        window.addEventListener('resize', init);
        
        init();
        draw();
    </script>
</body>
</html>
