<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIA | Quantum Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Inter', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 30px rgba(99, 102, 241, 0.6); }
        #flash { position: fixed; inset: 0; background: white; z-index: 100; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="ui" class="relative z-10 w-full h-screen flex flex-col items-center justify-between text-white p-8 pointer-events-none">
        <header class="w-full flex justify-between items-center pointer-events-auto">
            <div class="text-2xl font-black tracking-tighter glow-text italic">AETHERIA</div>
            <div class="text-[10px] tracking-[0.3em] font-light opacity-50">SYSTEM_READY</div>
        </header>

        <main class="text-center">
            <h1 id="title" class="text-6xl md:text-9xl font-black tracking-tighter mb-4 glow-text">BEYOND<br/><span class="text-indigo-500">REALITY</span></h1>
            <div id="cta" class="mt-10 pointer-events-auto">
                <button id="warp-btn" class="px-12 py-4 bg-indigo-600 hover:bg-white hover:text-indigo-900 rounded-full font-bold transition-all duration-500 transform hover:scale-110 shadow-[0_0_50px_rgba(79,70,229,0.5)]">
                    ENTER THE VOID
                </button>
            </div>
        </main>

        <footer class="w-full flex justify-between items-end pointer-events-auto">
            <div class="glass p-4 rounded-xl text-[10px] opacity-60 w-64">
                <div class="mb-1 text-indigo-400 font-bold">STATUS</div>
                Quantum leap module loaded. Ready for initialization.
            </div>
        </footer>
    </div>

    <script>
        let scene, camera, renderer, sphere, particles;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // コア
            const geometry = new THREE.IcosahedronGeometry(2, 10);
            const material = new THREE.MeshStandardMaterial({ color: 0x6366f1, wireframe: true });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // パーティクル
            const pGeom = new THREE.BufferGeometry();
            const pCount = 2000;
            const posArray = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) posArray[i] = (Math.random()-0.5)*20;
            pGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particles = new THREE.Points(pGeom, new THREE.PointsMaterial({ size: 0.01, color: 0xffffff }));
            scene.add(particles);

            scene.add(new THREE.PointLight(0xffffff, 1.5, 10).set(5,5,5));
            scene.add(new THREE.AmbientLight(0x404040));
            camera.position.z = 6;
        }

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.005;
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        // --- 核心：ボタンアクション ---
        document.getElementById('warp-btn').addEventListener('click', () => {
            // UIを消す
            gsap.to("#ui", { opacity: 0, duration: 0.5 });
            
            // 3Dアニメーション：加速と接近
            gsap.to(sphere.rotation, { y: sphere.rotation.y + 25, duration: 2, ease: "power4.inOut" });
            gsap.to(sphere.scale, { x: 0, y: 0, z: 0, duration: 1.5, ease: "power4.in" });
            gsap.to(camera.position, { z: 1, duration: 1.5, ease: "power4.in" });
            
            // フラッシュ演出
            gsap.to("#flash", { 
                opacity: 1, 
                duration: 1.2, 
                delay: 0.3,
                onComplete: () => {
                    alert("Welcome to the next dimension.");
                    location.reload(); // リセットして戻る
                }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
