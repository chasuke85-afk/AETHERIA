<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRYSTAL BIOME | Organic Light</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        .instruction {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 12px;
            letter-spacing: 2px; pointer-events: none; text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="instruction">Move your mouse to breathe life / Click to bloom</div>

    <script>
        // 数学的な美しさと「単純な凄さ」を両立するコード
        let particles = [];
        const numParticles = 120;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            angleMode(DEGREES);
            // 粒子を初期化
            for (let i = 0; i < numParticles; i++) {
                particles.push(new BioParticle(i));
            }
        }

        function draw() {
            // 残像を残して幻想的な光の筋を作る
            background(0, 0, 15, 25); 

            translate(width / 2, height / 2);

            for (let p of particles) {
                p.update();
                p.display();
            }
        }

        class BioParticle {
            constructor(id) {
                this.id = id;
                this.reset();
            }

            reset() {
                this.angle = random(360);
                this.radius = random(50, 150);
                this.size = random(2, 8);
                this.speed = random(0.2, 0.8);
                this.color = color(
                    random(100, 255), // Red
                    random(150, 255), // Green
                    random(200, 255), // Blue
                    150
                );
                this.offset = random(1000);
            }

            update() {
                // マウスの位置によって生命の動きが変化
                let mouseFactor = map(dist(mouseX, mouseY, width/2, height/2), 0, width, 2, 0.1);
                this.angle += this.speed * mouseFactor;
                
                // ノイズ関数による有機的な揺らぎ
                let n = noise(this.angle * 0.01, this.offset + frameCount * 0.01);
                this.currentRadius = this.radius + map(n, 0, 1, -50, 150);
                
                // 呼吸するようなサイズの変化
                this.currentSize = this.size * (1 + sin(frameCount * 2 + this.id) * 0.5);
            }

            display() {
                push();
                let x = cos(this.angle) * this.currentRadius;
                let y = sin(this.angle) * this.currentRadius;

                // 粒子本体の輝き
                noStroke();
                fill(this.color);
                drawingContext.shadowBlur = 15;
                drawingContext.shadowColor = this.color;
                ellipse(x, y, this.currentSize);

                // 粒子同士を繋ぐ繊細な糸（神経ネットワークのような美しさ）
                stroke(this.color);
                strokeWeight(0.2);
                for (let other of particles) {
                    let d = dist(x, y, cos(other.angle) * other.currentRadius, sin(other.angle) * other.currentRadius);
                    if (d < 100) {
                        line(x, y, cos(other.angle) * other.currentRadius, sin(other.angle) * other.currentRadius);
                    }
                }
                pop();
            }
        }

        function mousePressed() {
            // クリックで一斉に色が変化し、生命が弾ける
            for (let p of particles) {
                p.color = color(random(200, 255), random(50, 150), random(100, 255), 180);
                p.radius += 100;
                setTimeout(() => p.radius -= 100, 500);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
