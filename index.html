<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIA | The Quantum Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Inter', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glow-text { text-shadow: 0 0 30px rgba(99, 102, 241, 0.6); }
        .warp-overlay { position: fixed; inset: 0; background: white; z-index: 100; opacity: 0; pointer-events: none; mix-blend-mode: screen; }
    </style>
</head>
<body>

    <div id="warp-flash" class="warp-overlay"></div>

    <div id="ui" class="relative z-10 w-full h-screen flex flex-col items-center justify-between text-white p-8 pointer-events-none">
        <header class="w-full flex justify-between items-center pointer-events-auto">
            <div class="text-2xl font-black tracking-tighter glow-text uppercase italic">Aetheria</div>
            <div class="flex space-x-6 text-[10px] tracking-[0.3em] font-light opacity-50 uppercase">
                <span>System_Active</span>
                <span>Node: 2026_Gemini</span>
            </div>
        </header>

        <main class="text-center">
            <h1 id="title" class="text-6xl md:text-9xl font-black tracking-tighter mb-4 glow-text uppercase">
                BEYOND<br/><span class="text-indigo-500">REALITY</span>
            </h1>
            <p id="desc" class="max-w-xl mx-auto text-sm md:text-base text-slate-400 font-light leading-relaxed tracking-wide opacity-80">
                深淵を覗く時、深淵もまたあなたを覗いている。
                AIが構築した単一の宇宙が、今あなたの前で拍動する。
            </p>
            <div id="cta" class="mt-10 pointer-events-auto">
                <button id="main-btn" class="px-12 py-4 bg-indigo-600 hover:bg-white hover:text-indigo-900 rounded-full font-bold transition-all duration-500 transform hover:scale-110 shadow-[0_0_50px_rgba(79,70,229,0.5)]">
                    ENTER THE VOID
                </button>
            </div>
        </main>

        <footer class="w-full flex justify-between items-end pointer-events-auto">
            <div class="glass p-4 rounded-xl text-[10px] opacity-60 w-64 border-l-2 border-indigo-500">
                <div class="mb-1 text-indigo-400 font-bold tracking-widest">ENCRYPTED_SIGNAL</div>
                Connection stable. 3D engine at 120fps. Neural sync complete.
            </div>
            <div class="text-[10px] opacity-40 uppercase tracking-widest">© 2026 NEXT GEN AI INTERFACE</div>
        </footer>
    </div>

    <script>
        let scene, camera, renderer, core, wireframe, particles;
        let isWarping = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 前のバージョンの「凄さ」を再現：複雑な二重構造のコア
            const coreGeom = new THREE.IcosahedronGeometry(1.8, 15);
            const coreMat = new THREE.MeshStandardMaterial({ 
                color: 0x4f46e5, emissive: 0x1e1b4b, roughness: 0.1, metalness: 0.8 
            });
            core = new THREE.Mesh(coreGeom, coreMat);
            scene.add(core);

            const wireMat = new THREE.MeshBasicMaterial({ color: 0x6366f1, wireframe: true, transparent: true, opacity: 0.15 });
            wireframe = new THREE.Mesh(coreGeom, wireMat);
            wireframe.scale.setScalar(1.05);
            scene.add(wireframe);

            // 前のバージョンの「密なパーティクル」
            const pGeom = new THREE.BufferGeometry();
            const pCount = 3000;
            const pPos = new Float32Array(pCount * 3);
            for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random()-0.5)*18;
            pGeom.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            particles = new THREE.Points(pGeom, new THREE.PointsMaterial({ size: 0.015, color: 0xffffff, transparent: true, opacity: 0.5 }));
            scene.add(particles);

            const light1 = new THREE.PointLight(0x818cf8, 2); light1.position.set(10, 10, 10); scene.add(light1);
            const light2 = new THREE.AmbientLight(0x1e1b4b, 1.5); scene.add(light2);

            camera.position.z = 5;
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            
            if(!isWarping) {
                core.rotation.y += 0.002;
                wireframe.rotation.y -= 0.001;
                core.position.y = Math.sin(t) * 0.1;
                particles.rotation.y += 0.0005;
            }

            renderer.render(scene, camera);
        }

        // --- 核心：動かなかったボタンを「最高の演出」へ昇華 ---
        document.getElementById('main-btn').addEventListener('click', () => {
            isWarping = true;
            
            // UIをフェードアウト
            gsap.to("#ui", { opacity: 0, duration: 0.8, ease: "power2.in" });

            // コアが巨大化して迫ってくる
            gsap.to(core.scale, { x: 10, y: 10, z: 10, duration: 2, ease: "power4.in" });
            gsap.to(wireframe.scale, { x: 15, y: 15, z: 15, duration: 2, ease: "power4.in" });
            gsap.to(camera.position, { z: 1, duration: 1.5, ease: "power4.in" });

            // パーティクルが線状に流れる（ワープ演出）
            gsap.to(particles.rotation, { y: 20, duration: 2, ease: "power4.in" });

            // 真っ白なフラッシュ
            gsap.to("#warp-flash", { 
                opacity: 1, 
                duration: 1.5, 
                delay: 0.5,
                onComplete: () => {
                    alert("AETHERIA: DIMENSION SHIFT COMPLETE.\n次元跳躍が完了しました。");
                    window.location.reload(); // 再起動
                }
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
        animate();
    </script>
</body>
</html>
